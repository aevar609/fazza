<!DOCTYPE html>
<html>
<head>

     <!--نظام يدعم كل لغات العالم-->
    <meta charset="UTF-8" />

<!--تحويل الويب لتطبيق-->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!---->    

    <!--عشان يكون متجاوب مع حجم الشاشه-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="theme-color" content="#cda34f" /> <!--تلوين شريط المتصفح-->

    <!-- عشان لما اكبس على الرابط يطلعلي شرح عنو ووصف -->
    <meta name="description" content="فَزْعَة - منصتك الأولى لإنجاز المهام اليومية في الزرقاء " />
    
    <!--كون داخله اسم التطبيق، أيقونته، وكيف يفتح (شاشة كاملة ولا متصفح).-->
    <link rel="manifest" href="/manifest.json" /> 

    <!--فهذا السطر مخصص بس عشان لما مستخدم الآيفون ينزل التطبيق، تطلع اللوجو تبعتك صحيحة على شاشته.-->
    <link rel="apple-touch-icon" href="/logo192.png" /> 
    
<!--icon: هاي الأيقونة الصغيرة جداً (Favicon) اللي بتطلع جنب اسم موقعك في علامة التبويب (Tab) فوق بالمتصفح لما تفتحه من الكمبيوتر.-->
    <link rel="icon" type="image/png" href="/favicon.png" />
    

<!--سطر الـ preconnect: بتخلي المتصفح يجهز حاله ويتصل بسيرفرات جوجل بسرعة قبل ما يقرأ باقي الكود عشان يحمل الخط بأسرع وقت.-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    
    <!--سطر الـ stylesheet: هو اللي بجيب أوزان الخط (400 للعادي، 600 للسميك شوي، 700 للعريض جداً للعناوين). كلمة display=swap بتضمن إنه النص يظهر بخط عادي للمستخدم لحد ما خط Cairo يخلص تحميل، عشان الشاشة ما تضل بيضاء.-->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- ملف css -->
  <link rel="stylesheet" href="style.css">

    <title>فَزْعَة</title>

   
</head>

<body>

<div class="logo-continer">
    <img class="faza-logo" src="logo.png" alt="شعار فزعه" >
</div>



<div class="login-continer">

<button id="show-inputs" class="button-create-account">أنشاء حساب</button>


    <input class="input-login" type="text" placeholder="UserName" aria-label="UserName" required>

    <input class="input-login" type="password" placeholder="Password" aria-label="Password" required>

        

        <button id="submit" class="button-create-account">تسجيل الدخول</button>
</div>


<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
